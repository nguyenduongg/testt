<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8/3 Special Gift for Princess</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Press+Start+2P&family=VT323&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-bg: #ffeef2;
            --console: #ff85a2;
            --screen-bg: #fff0f3; 
            --accent: #ff4d6d;
            --btn-dark: #333;
        }

        body {
            margin: 0; padding: 0; background: var(--pink-bg);
            font-family: 'Poppins', sans-serif; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden; touch-action: manipulation;
            -webkit-user-select: none; user-select: none;
        }

        /* --- KEYFRAMES --- */
        @keyframes spin-intro { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes spin-mini { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* --- MINI PLAYER (DƯỚI GÓC PHẢI) --- */
        #mini-player {
            background: #fff; padding: 10px; border-radius: 12px;
            display: none; flex-direction: column; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid #333; width: 120px;
        }
        .player-disc-wrapper { width: 60px; height: 60px; margin-bottom: 5px; }
        #mini-thumb { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #333; }
        .rotating { animation: spin-mini 4s linear infinite !important; }
        .track-name-container { width: 100%; overflow: hidden; white-space: nowrap; margin-bottom: 5px; }
        .track-name { display: inline-block; font-family: 'VT323', monospace; font-size: 14px; animation: marquee 8s linear infinite; }
        .progress-bar-wrap { width: 100%; height: 3px; background: #eee; border-radius: 2px; position: relative; }
        #progressCurrent { height: 100%; background: var(--accent); width: 0%; position: absolute; }
        #miniPlayBtn { border: 2px solid #333; width: 24px; height: 24px; border-radius: 50%; background: none; cursor: pointer; font-size: 10px; margin-top: 5px; }

        /* --- UI DASHBOARD --- */
        .dashboard { display: none; width: 95%; max-width: 600px; flex-direction: column; align-items: center; padding: 10px 0; }
        .main-card { position: relative; aspect-ratio: 16/9; width: 100%; border-radius: 25px; overflow: hidden; background: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .slideshow-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 1.5s; }
        .slideshow-img.active { opacity: 1; }

        .bottom-ui {
            display: flex; justify-content: space-between; align-items: flex-end;
            width: 100%; padding: 0 5px; margin-top: 15px; box-sizing: border-box;
        }

        .calendar-card {
            background: white; padding: 10px; border-radius: 15px;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.1);
            width: 120px; text-align: center; border: 1px solid #eee;
        }
        .cal-month { color: var(--accent); font-weight: bold; font-size: 12px; margin-bottom: 5px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; font-size: 9px; color: #444; }
        .cal-day-special { background: var(--accent); color: white; border-radius: 4px; font-weight: bold; }

        /* --- CÁC THÀNH PHẦN GAME --- */
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); padding: 30px; border-radius: 30px; text-align: center; box-shadow: 0 10px 30px rgba(255, 77, 125, 0.2); width: 90%; max-width: 400px; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 100; }
        .music-list { list-style: none; padding: 0; margin: 20px 0; max-height: 250px; overflow-y: auto; text-align: left; }
        .music-item { display: flex; align-items: center; gap: 12px; background: white; padding: 8px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; border: 1px solid #eee; }
        .thumb { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }

        #music-intro { position: fixed; inset: 0; background: var(--pink-bg); display: none; justify-content: center; align-items: center; z-index: 150; }
        #pixel-player { width: 220px; image-rendering: pixelated; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); opacity: 0; transition: 0.5s; }
        #vinyl-disc { width: 105px; height: 105px; border-radius: 50%; object-fit: cover; border: 6px solid #111; position: absolute; left: -200px; top: 50%; transform: translateY(-50%); opacity: 0; z-index: 200; transition: left 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s; }
        #vinyl-disc.in-center { left: 50%; transform: translate(-50%, -50%); opacity: 1; }
        .intro-spinning { animation: spin-intro 2s linear infinite !important; }

        #game-rules { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 300; }
        .paper-container { width: 350px; height: 450px; background: url('paper.png') no-repeat center; background-size: contain; display: flex; flex-direction: column; align-items: center; padding: 85px 50px 100px 50px; text-align: center; box-sizing: border-box; }
        
        #game-box { display: none; width: 350px; height: 600px; background: var(--console); border-radius: 20px 20px 60px 20px; flex-direction: column; align-items: center; padding: 20px; z-index: 100; position: relative; }
        .screen-frame { width: 280px; height: 240px; background: #222; border-radius: 10px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; overflow: hidden; position: relative; }
        #canvas { background: var(--screen-bg); width: 250px; height: 200px; border: 3px solid #000; }
        #game-over-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 10; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop></audio>

    <div id="step-1" class="glass-card">
        <h2 style="color: var(--accent); font-family: 'Press Start 2P'; font-size: 12px;">HELLO MY BAE</h2>
        <input type="text" id="nameInput" style="padding:12px; border-radius:12px; border:2px solid #ffcbd5; width:80%; margin-bottom:20px; outline:none;" placeholder="Nhập tên của bạn" onkeydown="if(event.key === 'Enter') toStep2()">
        <br>
        <button style="background:var(--accent); color:white; padding:12px 25px; border:none; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="toStep2()">TIẾP TỤC</button>
    </div>

    <div id="step-2" class="glass-card hidden">
        <h2 style="color: var(--accent)">CHỌN NHẠC 🎵</h2>
        <div class="music-list">
            <div class="music-item" onclick="startIntro('music1.mp3', 'thumb1.jpg')"><img src="thumb1.jpg" class="thumb"> <span>Phonecert - Hoàng Dũng x 10cm</span></div>
            <div class="music-item" onclick="startIntro('music2.mp3', 'thumb2.jpg')"><img src="thumb2.jpg" class="thumb"> <span>In Love - LowG x Justatee</span></div>
            <div class="music-item" onclick="startIntro('music3.mp3', 'thumb3.jpg')"><img src="thumb3.jpg" class="thumb"> <span>Ôm trọn thương yêu - RUM</span></div>
            <div class="music-item" onclick="startIntro('music4.mp3', 'thumb4.jpg')"><img src="thumb4.jpg" class="thumb"> <span>Giữ anh cho ngày hôm qua - Hoàng Dũng</span></div>
            <div class="music-item" onclick="startIntro('music5.mp3', 'thumb5.jpg')"><img src="thumb5.jpg" class="thumb"> <span>Từng ngày yêu em - buitruonglinh</span></div>
        </div>
    </div>

    <div id="music-intro">
        <img id="vinyl-disc" src="">
        <img id="pixel-player" src="pixel_player.png">
    </div>

    <div id="game-rules">
        <div class="paper-container">
            <h2 style="font-family:'VT323'; color:#5a3e2b;">LUẬT CHƠI</h2>
            <p id="rule-text" style="font-family:'VT323'; font-size:18px; color:#5a3e2b; text-align:justify; white-space:pre-line;"></p>
            <button id="start-btn" style="display:none; background:#5a3e2b; color:white; padding:10px 25px; border:none; border-radius:5px; font-weight:bold; cursor:pointer; margin-top:auto; margin-bottom:15px;" onclick="reallyStartGame()">BẮT ĐẦU</button>
        </div>
    </div>

    <div id="game-box">
        <div style="width:100%; display:flex; justify-content:space-between; font-family:'Press Start 2P'; font-size:8px; color:#fff; margin-bottom:12px;">
            <span>SCORE: <span id="score">0</span>/8 ❤️</span>
            <span>LIVES: <span id="lives">❤️❤️❤️</span></span>
        </div>
        <div class="screen-frame">
            <canvas id="canvas"></canvas>
            <div id="game-over-overlay">
                <h3 style="font-family:'Press Start 2P'; font-size:12px;">GAME OVER</h3>
                <button style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;" onclick="restartGame()">THỬ LẠI</button>
            </div>
        </div>
        <div style="display:flex; gap:25px;">
            <button class="btn-move" style="width:80px; height:80px; border-radius:50%; background:#333; color:white; border:none;" onmousedown="move(true,'L')" onmouseup="move(false,'L')" ontouchstart="move(true,'L',event)" ontouchend="move(false,'L',event)">◀</button>
            <button class="btn-move" style="width:80px; height:80px; border-radius:50%; background:#333; color:white; border:none;" onmousedown="move(true,'R')" onmouseup="move(false,'R')" ontouchstart="move(true,'R',event)" ontouchend="move(false,'R',event)">▶</button>
        </div>
    </div>

    <div id="congrat-screen" class="hidden" style="position:fixed; inset:0; background:var(--pink-bg); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:500;">
        <h1 style="font-family:'VT323'; font-size:3.5rem; color:var(--accent);">CONGRATULATIONS!</h1>
        <button style="background:var(--accent); color:white; padding:15px 30px; border-radius:50px; border:none; cursor:pointer; font-weight:bold;" onclick="goToDashboard()">MỞ QUÀ NGAY 🎁</button>
    </div>

    <div id="dashboard" class="dashboard">
        <div class="main-card">
            <img src="anh1.jpg" class="slideshow-img active"><img src="anh2.jpg" class="slideshow-img"><img src="anh3.jpg" class="slideshow-img"><img src="anh4.jpg" class="slideshow-img">
        </div>
        <div class="content" style="text-align: center;">
            <h1 id="outName" style="font-family:'Dancing Script'; font-size:2.8rem; color:var(--accent); margin:10px 0 0 0;"></h1>
            <p id="outWish" class="typing" style="font-family:'Dancing Script'; font-size:1.5rem; color:#444; margin:5px 0; font-weight:700;"></p>
        </div>

        <div class="bottom-ui">
            <div class="calendar-card">
                <div class="cal-month">MARCH 2026</div>
                <div class="cal-grid" id="cal-grid"></div>
            </div>
            <div id="mini-player">
                <div class="player-disc-wrapper"><img id="mini-thumb" src="" class="rotating"></div>
                <div class="track-name-container"><div class="track-name" id="track-title">Loading...</div></div>
                <div class="progress-bar-wrap"><div id="progressCurrent"></div></div>
                <button id="miniPlayBtn" onclick="togglePlayMusic()">II</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('bgMusic');
        let userName = "", score = 0, gameActive = false, moveL = false, moveR = false, lives = 3, hearts = [], currentSlide = 0;

        const pics = [];
        let player = { x: 90, y: 125, h: 70, w: 55, currentPic: 0, facingLeft: false };

        for(let i=1; i<=4; i++) {
            const img = new Image();
            img.src = `pic${i}.png`;
            img.onload = function() {
                if(i === 1) player.w = player.h * (img.width / img.height);
            }
            pics.push(img);
        }

        window.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') moveL = true;
            if(e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') moveR = true;
        });
        window.addEventListener('keyup', (e) => {
            if(e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') moveL = false;
            if(e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') moveR = false;
        });

        function toStep2() {
            userName = document.getElementById('nameInput').value.trim();
            if(!userName) return alert("Vui lòng nhập tên!");
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        }

        function startIntro(music, thumb) {
            const items = document.querySelectorAll('.music-item');
            let fullTitle = "";
            items.forEach(it => { if(it.getAttribute('onclick').includes(music)) fullTitle = it.querySelector('span').innerText; });
            audio.src = music;
            document.getElementById('mini-thumb').src = thumb;
            document.getElementById('track-title').innerText = fullTitle;
            document.getElementById('step-2').classList.add('hidden');
            const introLayer = document.getElementById('music-intro');
            const vinyl = document.getElementById('vinyl-disc');
            introLayer.style.display = 'flex';
            vinyl.src = thumb;
            document.getElementById('pixel-player').style.opacity = '1';
            setTimeout(() => vinyl.classList.add('in-center'), 100);
            setTimeout(() => { vinyl.classList.add('intro-spinning'); audio.play(); document.getElementById('mini-thumb').classList.add('rotating'); }, 1400);
            setTimeout(() => { vinyl.classList.add('fly-out-combined'); document.getElementById('pixel-player').classList.add('fly-out-combined'); }, 3500);
            setTimeout(() => { introLayer.style.display = 'none'; showRules(); }, 4500);
        }

        function showRules() {
            document.getElementById('game-rules').style.display = 'flex';
            const msg = "Xin chào và chúc bạn một ngày tốt lành!\nSau đây là hướng dẫn chơi:\n Dùng phím mũi tên trên màn hình để di chuyển\n Nhặt đủ 8 trái tim để qua màn\n Cẩn thận trái tim màu đen nhé, chạm và là tèo đó\n Good luck ❤️";
            typeWriter(msg, "rule-text", 40, () => document.getElementById('start-btn').style.display = 'block');
        }

        function reallyStartGame() {
            document.getElementById('game-rules').style.display = 'none';
            document.getElementById('game-box').style.display = 'flex';
            restartGame();
        }

        function restartGame() {
            score = 0; lives = 3; hearts = []; player.x = 90;
            document.getElementById('score').innerText = "0";
            document.getElementById('lives').innerText = "❤️❤️❤️";
            document.getElementById('game-over-overlay').style.display = 'none';
            gameActive = true;
            canvas.width = 250; canvas.height = 200;
            update();
        }

        function move(isMoving, dir, e) {
            if(e && e.cancelable) e.preventDefault();
            if(dir === 'L') moveL = isMoving;
            if(dir === 'R') moveR = isMoving;
        }

        function drawHeart(x, y, s, color) {
            ctx.fillStyle = color; ctx.beginPath();
            ctx.moveTo(x, y+s/4); ctx.quadraticCurveTo(x,y,x+s/4,y);
            ctx.quadraticCurveTo(x+s/2,y,x+s/2,y+s/4); ctx.quadraticCurveTo(x+s/2,y,x+s*3/4,y);
            ctx.quadraticCurveTo(x+s,y,x+s,y+s/4); ctx.quadraticCurveTo(x+s,y+s/2,x+s/2,y+s*3/4);
            ctx.quadraticCurveTo(x,y+s/2,x,y+s/4); ctx.fill();
        }

        function update() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(moveL && player.x > 0) { player.x -= 4.5; player.facingLeft = true; }
            if(moveR && player.x < canvas.width - player.w) { player.x += 4.5; player.facingLeft = false; }
            player.currentPic = score < 2 ? 0 : score < 4 ? 1 : score < 6 ? 2 : 3;
            const img = pics[player.currentPic];
            if(img && img.complete) {
                ctx.save();
                if(player.facingLeft) { ctx.translate(player.x+player.w, player.y); ctx.scale(-1,1); ctx.drawImage(img,0,0,player.w,player.h); }
                else { ctx.drawImage(img, player.x, player.y, player.w, player.h); }
                ctx.restore();
            }
            if(Math.random() < 0.02) hearts.push({ x: Math.random()*230, y: -20, s: 15, type: 'pink', speed: 2.3 });
            if(Math.random() < 0.01) hearts.push({ x: Math.random()*230, y: -20, s: 15, type: 'black', speed: 1.5 });
            hearts.forEach((h, i) => {
                h.y += h.speed;
                drawHeart(h.x, h.y, h.s, h.type === 'pink' ? '#ff4d6d' : '#333');
                if(h.y > player.y && h.y < player.y + 40 && h.x > player.x - 5 && h.x < player.x + player.w + 5) {
                    if(h.type === 'pink') { score++; document.getElementById('score').innerText = score; }
                    else { lives--; document.getElementById('lives').innerText = "❤️".repeat(lives); if(lives <= 0){ gameActive = false; document.getElementById('game-over-overlay').style.display = 'flex'; }}
                    hearts.splice(i, 1);
                    if(score >= 8) { gameActive = false; document.getElementById('congrat-screen').classList.remove('hidden'); document.getElementById('game-box').style.display='none'; }
                }
                if(h.y > 200) hearts.splice(i, 1);
            });
            requestAnimationFrame(update);
        }

        function togglePlayMusic() {
            const btn = document.getElementById('miniPlayBtn');
            if (audio.paused) { audio.play(); btn.innerText = "II"; document.getElementById('mini-thumb').classList.add('rotating'); }
            else { audio.pause(); btn.innerText = "▶"; document.getElementById('mini-thumb').classList.remove('rotating'); }
        }

        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressCurrent').style.width = percent + '%';
        });

        function goToDashboard() {
            document.getElementById('congrat-screen').classList.add('hidden');
            document.getElementById('dashboard').style.display = 'flex';
            document.getElementById('mini-player').style.display = 'flex';
            document.getElementById('outName').innerText = `Thân gửi ${userName},`;
            typeWriter("Chúc nàng một ngày 8/3 thật rạng rỡ, xinh đẹp và ngập tràn niềm vui! Hãy luôn là đóa hoa rạng ngời nhất nhé! ❤️", "outWish", 60);
            generateCalendar();
            startSlideshow();
        }

        function typeWriter(text, id, speed, cb) {
            let i = 0; const el = document.getElementById(id); el.innerHTML = "";
            function t() { if(i<text.length){ el.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i); i++; setTimeout(t, speed); } else if(cb) cb(); }
            t();
        }

        function generateCalendar() {
            const grid = document.getElementById('cal-grid');
            grid.innerHTML = "";
            for(let i=1; i<=31; i++) {
                const day = document.createElement('div');
                day.innerText = i;
                if(i === 8) day.className = "cal-day-special";
                grid.appendChild(day);
            }
        }

        function startSlideshow() {
            const slides = document.querySelectorAll('.slideshow-img');
            if(slides.length === 0) return;
            setInterval(() => { 
                slides[currentSlide].classList.remove('active'); 
                currentSlide = (currentSlide + 1) % slides.length; 
                slides[currentSlide].classList.add('active'); 
            }, 4000);
        }
    </script>
</body>
</html>
